<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinguin.gg - AI Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #181a1b; color: #e8e6e3; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background-color: #1f2223; border-right: 1px solid #35393b; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 22px; font-weight: bold; color: #ffcc00; display: flex; align-items: center; gap: 10px; }
        .menu-item { padding: 10px; background: #282c2e; border-radius: 6px; cursor: pointer; text-align: center; font-weight: 500; transition: 0.2s; }
        .menu-item:hover { background: #ffcc00; color: #000; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 30px; justify-content: space-between; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        /* Chat Verlauf & Code Box */
        .chat-output { flex: 1; background: #131516; border: 1px solid #35393b; border-radius: 8px; padding: 20px; margin-bottom: 20px; overflow-y: auto; font-family: monospace; font-size: 14px; white-space: pre-wrap; color: #a2e3a4; }
        
        .prompt-container { background: #1f2223; border: 1px solid #35393b; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .prompt-input { width: 100%; height: 60px; background: transparent; border: none; color: #fff; font-size: 16px; resize: none; outline: none; }
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; }
        .credits { font-size: 14px; color: #aaa; background: #282c2e; padding: 6px 12px; border-radius: 20px; border: 1px solid #ffcc00; }
        .send-btn { background: #ffcc00; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: #e6b800; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🐧 Pinguin.gg</div>
        <div class="menu-item">Roblox Skripte</div>
        <div class="menu-item">AI Chat</div>
        <div class="menu-item">Samen-Pakete</div>
    </div>

    <div class="main-content">
        <div class="header">Frag die Pinguin-Roblox KI...</div>
        
        <div class="chat-output" id="ai-response">-- Warte auf deine Anfrage...
-- Wenn du 'Kill-Brick' eintippst, generiere ich das passende Skript!</div>
        
        <div class="prompt-container">
            <textarea class="prompt-input" id="user-prompt" placeholder="Schreibe hier, was dein Roblox-Skript tun soll... (z.B. Kill-Brick)"></textarea>
            <div class="bottom-bar">
                <div class="credits">Deine Pinguin-Credits: 🪙 ∞ (Unendlich!)</div>
                <button class="send-btn" onclick="generateRobloxCode()">Generieren ✨</button>
            </div>
        </div>
    </div>

    <script>
        // Diese Funktion simuliert die KI und speichert den Code für Roblox ab
        function generateRobloxCode() {
            const prompt = document.getElementById('user-prompt').value.toLowerCase();
            const output = document.getElementById('ai-response');
            let generatedCode = "";

            if (prompt.includes("kill") || prompt.includes("tot")) {
                generatedCode = `-- Pinguin.gg AI Generated Kill-Brick Script\nlocal brick = script.Parent\n\nlocal function onTouch(part)\n    local humanoid = part.Parent:FindFirstChildOfClass("Humanoid")\n    if humanoid then\n        humanoid.Health = 0\n    end\nend\n\nbrick.Touched:Connect(onTouch)`;
            } else if (prompt.includes("speed") || prompt.includes("schnell")) {
                generatedCode = `-- Pinguin.gg AI Generated Speed-Pad\nlocal pad = script.Parent\n\npad.Touched:Connect(function(part)\n    local player = part.Parent:FindFirstChildOfClass("Humanoid")\n    if player then\n        player.WalkSpeed = 50\n        wait(5)\n        player.WalkSpeed = 16\n    end\nend)`;
            } else {
                generatedCode = `-- Pinguin.gg AI\n-- Befehl nicht ganz verstanden. Versuche 'Kill-Brick' oder 'Speed-Pad'!\nprint("Pinguin.gg KI ist bereit!")`;
            }

            output.innerText = generatedCode;
            
            // Speichert den Code lokal im Browser, damit Roblox ihn abrufen kann!
            localStorage.setItem('roblox_code', generatedCode);
            alert("Code wurde generiert! Du kannst ihn jetzt in Roblox Studio abrufen.");
        }
    </script>

</body>
</html>
