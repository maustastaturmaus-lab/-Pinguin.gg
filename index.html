<!DOCTYPE html>
<html lang="de">

        body { background-color: #111415; color: #e8e6e3; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 250px; background-color: #191b1c; border-right: 1px solid #2d3133; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #ffcc00; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .menu-item { padding: 12px; background: #222627; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600; transition: 0.2s; border: 1px solid #2d3133; }
        .menu-item:hover { background: #ffcc00; color: #000; border-color: #ffcc00; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 35px; justify-content: space-between; background-color: #141617; }
        .header { font-size: 26px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
        
        .chat-output { flex: 1; background: #0b0c0d; border: 1px solid #222627; border-radius: 10px; padding: 20px; margin-bottom: 25px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 15px; white-space: pre-wrap; color: #39e37c; line-height: 1.5; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        
        .prompt-container { background: #191b1c; border: 1px solid #2d3133; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .prompt-input { width: 100%; height: 70px; background: transparent; border: none; color: #fff; font-size: 16px; resize: none; outline: none; }
        
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; border-top: 1px solid #2d3133; }
        .credits { font-size: 13px; color: #ffcc00; background: #222627; padding: 8px 16px; border-radius: 20px; border: 1px solid #3d3511; font-weight: bold; }
        .send-btn { background: #ffcc00; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .send-btn:hover { background: #e6b800; transform: scale(1.03); }
    </style>
</head>
